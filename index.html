<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahil Bhai OG | India's No.1 Channel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0A0E1A;
    --surface: #121830;
    --surface-2: #1A2140;
    --blue: #2AABEE;
    --blue-deep: #0E6FB0;
    --gold: #F5B942;
    --text: #F4F6FB;
    --muted: #8E98B8;
    --line: rgba(255,255,255,0.08);
    --radius: 18px;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    background: var(--bg);
    color: var(--text);
    font-family:'Manrope', sans-serif;
    overflow-x:hidden;
    -webkit-font-smoothing: antialiased;
  }

  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:
      radial-gradient(ellipse 90% 60% at 50% -10%, rgba(42,171,238,0.25), transparent 60%),
      radial-gradient(ellipse 70% 50% at 90% 100%, rgba(245,185,66,0.10), transparent 60%),
      var(--bg);
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important;}
  }

  /* ---------- MARQUEE ---------- */
  .marquee-wrap{
    width:100%;
    background: linear-gradient(90deg, var(--blue-deep), var(--blue));
    border-bottom: 1px solid rgba(255,255,255,0.15);
    overflow:hidden;
    padding: 10px 0;
    position:relative;
    z-index:5;
  }
  .marquee-track{
    display:flex;
    width:max-content;
    animation: scrollLeft 18s linear infinite;
  }
  .marquee-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:0 28px;
    font-family:'Archivo Black', sans-serif;
    font-size: 15px;
    letter-spacing: 1.5px;
    color:#06121E;
    white-space:nowrap;
  }
  .marquee-item .star{ color:#06121E; opacity:0.55; font-size:12px; }

  @keyframes scrollLeft{
    from{ transform: translateX(0); }
    to{ transform: translateX(-50%); }
  }

  /* ---------- NAV / EYEBROW ---------- */
  .eyebrow{
    margin: 40px auto 0;
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 18px;
    border:1px solid var(--line);
    border-radius: 999px;
    background: rgba(255,255,255,0.03);
    font-size:12.5px;
    font-weight:700;
    letter-spacing:1.6px;
    color: var(--gold);
    text-transform:uppercase;
    width:max-content;
  }
  .eyebrow .dot{
    width:7px;height:7px;border-radius:50%;
    background: var(--gold);
    box-shadow: 0 0 0 0 rgba(245,185,66,0.6);
    animation: pulseDot 1.8s ease-out infinite;
  }
  @keyframes pulseDot{
    0%{ box-shadow: 0 0 0 0 rgba(245,185,66,0.55);}
    70%{ box-shadow: 0 0 0 8px rgba(245,185,66,0);}
    100%{ box-shadow: 0 0 0 0 rgba(245,185,66,0);}
  }

  /* ---------- HERO ---------- */
  .hero{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding: 0 24px 70px;
  }

  .avatar-zone{
    position:relative;
    margin-top: 38px;
    width:168px;
    height:168px;
  }
  .avatar-ring{
    position:absolute;
    inset:-10px;
    border-radius:50%;
    background: conic-gradient(from 0deg, var(--blue), var(--gold), var(--blue));
    animation: spin 5s linear infinite;
    filter: blur(0.3px);
  }
  .avatar-ring::before{
    content:"";
    position:absolute;
    inset:4px;
    border-radius:50%;
    background: var(--bg);
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .avatar{
  position:absolute;
  inset:8px;
  border-radius:50%;
  width: calc(100% - 16px);
  height: calc(100% - 16px);
  object-fit: cover;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
}

  .verified-badge{
    position:absolute;
    bottom:2px;
    right:2px;
    width:38px;
    height:38px;
    border-radius:50%;
    background: var(--blue);
    border: 4px solid var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .verified-badge svg{ width:18px; height:18px; }

  .name{
    font-family:'Archivo Black', sans-serif;
    font-size: clamp(38px, 9vw, 74px);
    line-height: 1;
    letter-spacing: -1px;
    margin-top: 26px;
    background: linear-gradient(180deg, #FFFFFF 40%, #B9C4E0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .name .og{
    background: linear-gradient(180deg, var(--gold), #FFD98A);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .tagline{
    margin-top: 14px;
    max-width: 480px;
    color: var(--muted);
    font-size: 16.5px;
    font-weight:500;
    line-height:1.55;
  }

  /* ---------- STATS ---------- */
  .stats{
    display:flex;
    gap: 34px;
    margin-top: 30px;
    padding: 16px 30px;
    border-radius: var(--radius);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
  }
  .stat{ text-align:center; }
  .stat .num{
    font-family:'Archivo Black', sans-serif;
    font-size: 21px;
    color: var(--text);
  }
  .stat .lbl{
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .stat-divider{ width:1px; background: var(--line); }

  /* ---------- BUTTONS ---------- */
  .cta-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap: 16px;
    margin-top: 36px;
  }

  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap: 14px;
    padding: 26px 56px;
    border-radius: 18px;
    font-family:'Manrope', sans-serif;
    font-weight: 800;
    font-size: 24px;
    letter-spacing: 0.2px;
    text-decoration:none;
    cursor:pointer;
    border: none;
    transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
  }
  .btn:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }
  .btn:active{ transform: translateY(1px) scale(0.99); }

  .btn-primary{
    background: linear-gradient(180deg, #FF4D4D, #C81E2A);
    color: #FFFFFF;
    box-shadow: 0 10px 30px -6px rgba(233,42,42,0.55), inset 0 1px 0 rgba(255,255,255,0.25);
    animation: pulseGlow 2.4s ease-in-out infinite;
  }
  @keyframes pulseGlow{
    0%, 100%{ box-shadow: 0 10px 30px -6px rgba(233,42,42,0.55), inset 0 1px 0 rgba(255,255,255,0.25); }
    50%{ box-shadow: 0 10px 42px -4px rgba(233,42,42,0.85), inset 0 1px 0 rgba(255,255,255,0.3); }
  }
  .btn-primary:hover{
    filter: brightness(1.08);
    box-shadow: 0 14px 34px -6px rgba(233,42,42,0.7), inset 0 1px 0 rgba(255,255,255,0.3);
    transform: translateY(-2px);
    animation-play-state: paused;
  }
  .btn-primary svg{ width:30px; height:30px; flex-shrink:0; }

  .btn-secondary{
    background: rgba(255,255,255,0.04);
    color: var(--text);
    border: 1.5px solid rgba(255,255,255,0.16);
  }
  .btn-secondary:hover{
    background: rgba(255,255,255,0.08);
    border-color: var(--gold);
    transform: translateY(-2px);
    color: var(--gold);
  }
  .btn-secondary svg{ width:18px; height:18px; }

  /* ---------- FOOTER ---------- */
  .footer{
    text-align:center;
    padding: 22px 20px 30px;
    font-size: 12.5px;
    color: var(--muted);
    border-top: 1px solid var(--line);
    letter-spacing: 0.3px;
  }
  .footer b{ color: var(--gold); }

  /* fade-in on load */
  .fade-up{
    animation: fadeUp 0.7s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(16px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .d1{ animation-delay: .05s; }
  .d2{ animation-delay: .15s; }
  .d3{ animation-delay: .25s; }
  .d4{ animation-delay: .35s; }
  .d5{ animation-delay: .45s; }

  @media (max-width: 600px){
    .hero{ padding: 0 18px 50px; }
    .eyebrow{ margin-top: 28px; font-size: 11px; padding: 7px 14px; text-align:center; }
    .avatar-zone{ margin-top: 26px; width: 132px; height: 132px; }
    .avatar{ font-size: 40px; }
    .verified-badge{ width: 30px; height: 30px; }
    .verified-badge svg{ width:15px; height:15px; }
    .name{ margin-top: 20px; }
    .tagline{ font-size: 15px; margin-top: 12px; }
    .stats{ gap: 16px; padding: 14px 14px; margin-top: 24px; }
    .stat .num{ font-size: 16px; }
    .stat .lbl{ font-size: 9.5px; }
    .cta-row{ width: 100%; margin-top: 26px; }
    .btn{
      width: 100%;
      padding: 20px 24px;
      font-size: 18px;
      gap: 10px;
    }
    .btn-primary svg{ width: 24px; height: 24px; }
    .marquee-item{ font-size: 12.5px; padding: 0 18px; letter-spacing: 1px; }
    .footer{ font-size: 11.5px; padding: 18px 16px 24px; }
  }

  @media (max-width: 360px){
    .name{ font-size: 32px; }
    .avatar-zone{ width: 112px; height: 112px; }
    .avatar{ font-size: 34px; }
    .stats{ gap: 10px; padding: 12px 8px; }
    .btn{ padding: 18px 18px; font-size: 16px; }
  }
</style>
</head>
