    <style>
        /* ---------- Reset & Base ---------- */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            background: #0b0b1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            color: #fff;
        }

        /* ---------- Card ---------- */
        .card {
            max-width: 640px;
            width: 100%;
            background: linear-gradient(145deg, #12122a, #1a1a3e);
            border-radius: 32px;
            padding: 40px 30px 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(255, 165, 0, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ---------- Headline ---------- */
        .headline {
            font-family: 'Archivo Black', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 0.02em;
            line-height: 1.2;
            padding: 14px 10px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border-radius: 16px;
            color: #0b0b1a;
            display: inline-block;
            margin: 0 auto 20px;
            box-shadow: 0 4px 20px rgba(247, 151, 30, 0.3);
            width: 100%;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.2);
            word-break: break-word;
        }

        /* ---------- Image ---------- */
        .image-wrapper {
            margin: 10px auto 20px;
            display: flex;
            justify-content: center;
        }

        .image-wrapper img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 50%;
            border: 6px solid #f7971e;
            box-shadow: 0 0 40px rgba(247, 151, 30, 0.25), inset 0 0 20px rgba(247, 151, 30, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: block;
        }

        .image-wrapper img:hover {
            transform: scale(1.02);
            box-shadow: 0 0 60px rgba(247, 151, 30, 0.4);
        }

        /* ---------- Sub-headline ---------- */
        .sub-headline {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 8px 0 28px;
            letter-spacing: 0.01em;
            color: #fff;
        }

        .sub-headline span {
            color: #ffd200;
            background: rgba(255, 210, 0, 0.10);
            padding: 0 12px;
            border-radius: 8px;
            display: inline-block;
        }

        /* ---------- Buttons ---------- */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            border-bottom: 4px solid rgba(200, 120, 0, 0.8);
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            text-decoration: none;
            width: 100%;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 20px rgba(247, 151, 30, 0.35);
            color: #0b0b1a;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(247, 151, 30, 0.5);
            background: linear-gradient(135deg, #f8a82e, #ffe033);
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 12px rgba(247, 151, 30, 0.3);
        }

        .btn i {
            font-size: 1.4rem;
            opacity: 0.9;
            color: #0b0b1a;
        }

        /* Second button – emoji style */
        .btn-emoji {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border-bottom-color: rgba(200, 120, 0, 0.8);
        }

        .btn-emoji:hover {
            background: linear-gradient(135deg, #f8a82e, #ffe033);
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 600px) {
            .card {
                padding: 28px 18px 36px;
                border-radius: 24px;
            }

            .headline {
                font-size: 1.5rem;
                padding: 12px 8px;
                letter-spacing: 0.01em;
            }

            .image-wrapper img {
                width: 140px;
                height: 140px;
                border-width: 5px;
            }

            .sub-headline {
                font-size: 1.1rem;
                margin: 4px 0 20px;
            }

            .btn {
                font-size: 1rem;
                padding: 14px 18px;
                gap: 10px;
            }

            .btn i {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 400px) {
            .headline {
                font-size: 1.2rem;
                padding: 10px 6px;
            }

            .image-wrapper img {
                width: 110px;
                height: 110px;
            }

            .sub-headline {
                font-size: 0.95rem;
            }

            .btn {
                font-size: 0.9rem;
                padding: 12px 14px;
            }
        }
    </style>
