        /* ---------- Reset & Base ---------- */
        *,

        .card {

            width: 100%;
            background: linear-gradient(145deg, #12122a, #1a1a3e);
            border-radius: 40px;
            padding: 44px 34px 54px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: radial-gradient(circle at 30% 20%, rgba(79, 172, 254, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ---------- Glow line top ---------- */
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4facfe, #00f2fe, #4facfe, transparent);
            opacity: 0.6;
            border-radius: 100%;
        }

        /* ---------- Headline (Sky Blue) ---------- */
        .headline {
            font-family: 'Archivo Black', sans-serif;
            font-size: 2.3rem;
            letter-spacing: 0.02em;
            line-height: 1.2;
            padding: 16px 14px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border-radius: 18px;
            color: #0b0b1a;
            display: inline-block;
            margin: 0 auto 22px;
            box-shadow: 0 4px 30px rgba(79, 172, 254, 0.35);
            width: 100%;
            text-shadow: 0 1px 3px rgba(255, 255, 255, 0.3);
            word-break: break-word;
            position: relative;
            z-index: 2;
        }

        /* ---------- Profile Image with Rings & Verification ---------- */
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin: 8px auto 18px;
        }

        /* Animated rotating ring - outer */
        .ring-outer {
            position: absolute;
            top: -10px;
            left: -10px;
            width: calc(100% + 20px);
            height: calc(100% + 20px);
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #4facfe;
            border-bottom-color: #00f2fe;
            animation: spin 3s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* Animated rotating ring - inner (reverse) */
        .ring-inner {
            position: absolute;
            top: -4px;
            left: -4px;
            width: calc(100% + 8px);
            height: calc(100% + 8px);
            border-radius: 50%;
            border: 2px solid transparent;
            border-left-color: rgba(79, 172, 254, 0.5);
            border-right-color: rgba(0, 242, 254, 0.5);
            animation: spin-reverse 4s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* Pulsing ring - outer glow */
        .ring-pulse {
            position: absolute;
            top: -16px;
            left: -16px;
            width: calc(100% + 32px);
            height: calc(100% + 32px);
            border-radius: 50%;
            border: 2px solid rgba(79, 172, 254, 0.15);
            animation: pulse-ring 2.5s ease-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-reverse {
            to {
                transform: rotate(-360deg);
            }
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        .profile-image {
            position: relative;
            z-index: 1;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #4facfe;
            box-shadow: 0 0 50px rgba(79, 172, 254, 0.25), inset 0 0 30px rgba(79, 172, 254, 0.05);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            display: block;
        }

        .profile-image:hover {
            transform: scale(1.03);
            box-shadow: 0 0 70px rgba(79, 172, 254, 0.4);
        }

        /* ---------- Verification Badge ---------- */
        .verification-badge {

            bottom: 4px;
            right: 4px;
            z-index: 10;
            background: linear-gradient(135deg, #1da1f2, #0d8bf0);

            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #1a1a3e;
            box-shadow: 0 0 20px rgba(29, 161, 242, 0.5), inset 0 0 10px rgba(255, 255, 255, 0.2);
            animation: badge-glow 2s ease-in-out infinite alternate;
        }

        .verification-badge i {
            font-size: 1.2rem;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        @keyframes badge-glow {

            border-top: 1px solid rgba(255, 255, 255, 0.04);

        .stat-item {

        }

        .stat-number {

        .stat-label {

        }

        /* ---------- Buttons (Sky Blue) ---------- */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 4px;
            position: relative;
            z-index: 2;
        }

        .btn {

            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 18px 28px;
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            border-bottom: 4px solid rgba(0, 100, 200, 0.8);
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.3s ease, background 0.3s ease;
            text-decoration: none;
            width: 100%;
            letter-spacing: 0.02em;
            box-shadow: 0 6px 30px rgba(79, 172, 254, 0.35);
            color: #0b0b1a;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';

            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(79, 172, 254, 0.5);
            background: linear-gradient(135deg, #2b9afc, #00d4ff);

        .btn:active {

        }
